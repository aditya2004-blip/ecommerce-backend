version: "3.8"

services:
  # 1. MySQL Database Container
  mysql:
    image: mysql:8.0.34
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "ecommerce_db"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Redis Container (Added for your caching/inventory logic!)
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"

  # 3. phpMyAdmin Container (Optional UI to see your MySQL database in the browser)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecommerce-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "root"
    ports:
      - "8081:80"
    depends_on:
      - mysql

  # 4. Your Spring Boot Application Container
  springboot:
    build: .
    container_name: ecommerce-backend
    ports:
      - "8080:8080" # Mapped to 8080 so your Postman collection still works!
    environment:
      TZ: "Asia/Kolkata"
      # DB Config (Points to the 'mysql' container name)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "root"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_SHOW_SQL: "true"
      # Redis Config (Points to the 'redis' container name)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Security Config
      JWT_SECRET: "YOUR_SUPER_SECRET_KEY_MUST_BE_LONG_ENOUGH"
      JWT_EXPIRATION: 86400000
      # Email Config
      SPRING_MAIL_HOST: "smtp.gmail.com"
      SPRING_MAIL_PORT: "587"
      SPRING_MAIL_USERNAME: "your-email@gmail.com"
      SPRING_MAIL_PASSWORD: "your-app-password"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    depends_on:
      - mysql
      - redis

# Persistent storage so your DB doesn't wipe when Docker closes
volumes:
  mysql_data: